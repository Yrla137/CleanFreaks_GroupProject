<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preload" as="image" href="../public/cleanfreak_logo-eco-green.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <link rel="stylesheet" href="./recipes.css">
    <link rel="stylesheet" href="../header.css">
    <link rel="stylesheet" href="../loader.css">
    <!-- Länk till icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cookie&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="top-bar">

            <!-- Hamburgarmeny -->
            <button class="menu-btn" aria-label="Öppna meny" aria-expanded="false" aria-controls="main-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="menu" id="main-menu" hidden>
                <ul>
                    <li><a href="../../index.html">Hem</a></li>
                    <li><a href="../blog.html">Blogginlägg</a></li>
                    <li><a href="../aboutUs_contact.html">Om oss / Kontakta oss</a></li>
                    <li><a href="../category.html">Kategorier</a></li>
                </ul>
            </nav>

            <!-- Logga -->
            <div class="logo">
                <a href="../../index.html">
                    <img src="../../public/cleanfreak_logo-white.png" alt="CleanFreak logotyp" class="logo-image" />
                    <h3 class="logo-style">CleanFreak</h3>
                </a>
            </div>

            <!-- Sök -->
            <form action="../search.html" method="GET">
                <div class="search">
                    <input type="search" name="q" id="search-input" placeholder="Vad vill du städa?" />
                    <button type="submit" style="display:none;"></button>
                    <span class="fa fa-search icon" onclick="this.parentElement.parentElement.submit();"
                        style="cursor:pointer;"></span>
                </div>
            </form>

        </div>
    </header>

    <main>
        <div class="full-recipe-container">
            <h1 id="recipes-title"></h1>
            <div class="recipe-media">
                <div id="recipes-image"></div>
            </div>
            <h2 id="recipes-description"></h2>
            <div id="recipes-info">
                <div id="recipes-time" class="info-tag"></div>
                <div id="recipes-difficulty" class="info-tag"></div>
                <div id="recipes-eco-friendly" class="info-tag"></div>
            </div>

            <!-- Loader -->
            <div id="page-loader" class="loader-overlay" style="display: none;">
                <div class="loader-content">
                    <img src="../../public/cleanfreak_logo-eco-green.png" alt="Städar..." class="sweeping-brush">
                    <p>Vi städar fram sidan...</p>
                </div>
            </div>

            <div id="recipes-tools-ingredients">
                <div id="recipes-tools"></div>
                <div id="recipes-ingredients"></div>
            </div>
            <div id="recipes-steps"></div>

            <div id="recipe-tags"></div>
        </div>

        <div class="related-recipes">
            <h2>Relaterade recept</h2>
            <div id="related-recipes-container"></div>
        </div>
    </main>

    <div class="footer-background">
        <footer>
            <div class="footer-header">
                <h3 class="logo-style">CleanFreak</h3>
            </div>
            <div class="footer-container">

                <div>
                    <h4>Navigation</h4>
                    <ul>
                        <li><a href="../../index.html">Hem</a></li>
                        <li><a href="../blog.html">Blogg</a></li>

                    </ul>
                </div>

                <div>
                    <h4>Följ oss</h4>
                    <ul>
                        <li><a href="https://www.facebook.com/cleanfreaks" target="_blank">Facebook</a></li>
                        <li><a href="https://www.instagram.com/cleanfreaks" target="_blank">Instagram</a></li>
                        <li><a href="https://www.tiktok.com/@cleanfreaks" target="_blank">Tiktok</a></li>
                        <li><a href="https://www.youtube.com/cleanfreaks" target="_blank">YouTube</a></li>

                    </ul>
                </div>

                <div>
                    <a href="../aboutUs_contact.html">
                        <h4>Kontakt</h4>
                    </a>
                    <p>info@cleanfreak.se</p>
                </div>
            </div>

            <div class="footer-bottom">
                <p>© 2026 CleanFreak</p>
            </div>

        </footer>
    </div>
</body>

<script src="../loader.js"></script>
<script type="module" src="./recipes.js"></script>
<script src="../header.js"></script>
<script src="../headerSearch.js"></script>

</html>
