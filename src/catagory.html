<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rums-kategorier – Clean Freak</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="category.css" />
</head>
<body>

  <!-- Header placeholder – ersätt med gruppens gemensamma header -->
  <div id="header-placeholder">[ Header från gruppen klistras in här ]</div>

  <!-- Hero -->
  <section class="hero">
    <h1>Rums-kategorier</h1>
    <p>Välj ett rum för att se areas och problem</p>
  </section>

  <!-- Room tabs -->
  <div class="room-tabs" id="room-tabs">
    <div class="spinner"></div>
  </div>

  <!-- Selected room title -->
  <div class="room-title-section" id="room-title-section" style="display:none;">
    <h2 id="room-title-text">Laddar...</h2>
  </div>

  <!-- Areas grid -->
  <section class="areas-section">
    <div class="areas-grid" id="areas-grid">
      <p class="status-msg">Välj ett rum ovan för att se areas.</p>
    </div>
  </section>

  <script src="category.js"></script>
</body>
</html>
